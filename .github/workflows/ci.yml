name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  orchestrator:
    name: orchestrator (python unittest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # orchestrator is dependency-free (stdlib only) — nothing to install.
      - name: Run unit tests
        run: python3 -m unittest discover -s orchestrator/tests -v

  cockpit:
    name: cockpit (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cockpit/package-lock.json
      - name: Install
        run: npm ci --prefix cockpit
      - name: Build (tsc + vite)
        run: npm run build --prefix cockpit
